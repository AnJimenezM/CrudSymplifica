version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: postgres_database
    environment:
      POSTGRES_DB: empleados
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5588
    ports:
      - "5432:5432"

  backend:
    build: ./backendCrud
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres

  frontend:
    build: ./frontendCrud
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend